{% extends "base.html" %}
{% block title %}三钱起卦法 · 历史{% endblock %}
{% block content %}
<section class="card">
  <h1>历史记录</h1>

  {% if items %}
  <div class="stack">
    {% for item in items %}
    <article class="sub-card">
      <a class="reading-link" href="/readings/{{ item.id }}">
        <p><strong>{{ item.question }}</strong></p>
        <p class="muted">{{ item.timestamp }}</p>
        <p class="muted">本：{{ item.original }} → 变：{{ item.changed }}</p>
      </a>
      <form method="post" action="/history/{{ item.id }}/delete" onsubmit="return confirm('确定删除这条记录吗？')">
        <button type="submit" class="danger">删除</button>
      </form>
    </article>
    {% endfor %}
  </div>

  <form method="post" action="/history/clear" onsubmit="return confirm('确定清空所有记录吗？')">
    <button type="submit" class="danger">清空所有记录</button>
  </form>
  {% else %}
  <p class="muted">暂无起卦记录。</p>
  {% endif %}

  <div class="actions">
    <a class="link" href="/">去起一卦</a>
  </div>
</section>
{% endblock %}
